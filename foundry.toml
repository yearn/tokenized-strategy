[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
solc = "0.8.18"
evm_version = "paris"
optimize = true
optimizer_runs = 200
no_match_test = "testFail"

remappings = [
    'forge-std/=lib/forge-std/src/',
    '@openzeppelin/=lib/openzeppelin-contracts/',
]
fs_permissions = [{ access = "read", path = "./"}]

[fuzz]
runs = 10_0
max_test_rejects = 1_000_000

[invariant]
runs = 100
depth = 100
